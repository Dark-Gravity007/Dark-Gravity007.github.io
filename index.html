<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:#1a1a1a;
  font-family:Arial,sans-serif;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.topbar{
  background:#111;
  text-align:center;
  padding:5px 0 4px;
  font-size:10px;
  color:#888;
  letter-spacing:1px;
  text-transform:uppercase;
  flex-shrink:0;
}
.grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px;
  background:#111;
  padding:2px;
}
.app{
  background:#222;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  cursor:pointer;
  border-radius:4px;
  text-decoration:none;
  padding:6px 4px;
  transition:background 0.1s;
}
.app:active{background:#0055aa;}
.app svg{
  width:36px;
  height:36px;
  flex-shrink:0;
}
.app span{
  font-size:8px;
  color:#aaa;
  text-align:center;
  line-height:1.2;
  max-width:56px;
}
.app.center-last{
  grid-column:2;
}
.footer{
  background:#111;
  border-top:1px solid #333;
  color:#00d4ff;
  font-size:11px;
  text-align:center;
  padding:5px;
  flex-shrink:0;
  min-height:22px;
  font-weight:bold;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="topbar">My Apps</div>
<div class="grid">

  <!-- YouTube Music -->
  <a class="app" href="https://music.youtube.com" onclick="sf('YouTube Music')">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="#FF0000"/>
      <circle cx="20" cy="20" r="10" fill="white" opacity="0.15"/>
      <circle cx="20" cy="20" r="6" fill="white"/>
      <circle cx="20" cy="20" r="2.5" fill="#FF0000"/>
      <polygon points="18,17 24,20 18,23" fill="#FF0000"/>
    </svg>
    <span>YT Music</span>
  </a>

  <!-- Telegram -->
  <a class="app" href="https://web.telegram.org/a/" onclick="sf('Telegram')">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="#26A5E4"/>
      <path d="M8 20L30 11L25 31L17 24.5L13 27.5L14 21L27 14.5L15 22L8 20Z" fill="white"/>
      <path d="M17 24.5L14 27.5L15 21L17 24.5Z" fill="#C8DAEA"/>
    </svg>
    <span>Telegram</span>
  </a>

  <!-- Google Search Lite -->
  <a class="app" href="https://www.google.com/xhtml" onclick="sf('Google Search')">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="white"/>
      <path d="M28.5 20.2c0-.6-.1-1.2-.2-1.8H20v3.4h4.8c-.2 1-.8 1.9-1.7 2.5v2h2.8c1.6-1.5 2.6-3.7 2.6-6.1z" fill="#4285F4"/>
      <path d="M20 30c2.4 0 4.5-.8 6-2.2l-2.8-2c-.8.5-1.9.8-3.2.8-2.5 0-4.6-1.7-5.3-3.9h-2.9v2.1C13.3 28.1 16.4 30 20 30z" fill="#34A853"/>
      <path d="M14.7 22.7c-.2-.6-.3-1.2-.3-1.7 0-.6.1-1.2.3-1.7v-2.1h-2.9C11 18.6 10.5 19.8 10.5 21s.5 2.4 1.3 3.4l2.9-1.7z" fill="#FBBC05"/>
      <path d="M20 15.1c1.4 0 2.6.5 3.6 1.4l2.6-2.6C24.5 12.3 22.4 11.5 20 11.5c-3.6 0-6.7 1.9-8.2 4.8l2.9 2.1c.7-2.2 2.8-3.3 5.3-3.3z" fill="#EA4335"/>
    </svg>
    <span>Google</span>
  </a>

  <!-- Wikipedia -->
  <a class="app" href="https://en.m.wikipedia.org" onclick="sf('Wikipedia')">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="white"/>
      <circle cx="20" cy="20" r="13" stroke="#000" stroke-width="1.5" fill="none"/>
      <text x="20" y="25" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#000">W</text>
    </svg>
    <span>Wikipedia</span>
  </a>

  <!-- Merriam-Webster -->
  <a class="app center-last" href="https://www.merriam-webster.com" onclick="sf('Merriam-Webster')">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="#1a3a6b"/>
      <rect x="11" y="10" width="8.5" height="19" rx="1" fill="white"/>
      <rect x="20.5" y="10" width="8.5" height="19" rx="1" fill="#b0c4de"/>
      <text x="15.25" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="#1a3a6b">MW</text>
      <text x="24.75" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="#1a3a6b">MW</text>
    </svg>
    <span>Dictionary</span>
  </a>

</div>
<div class="footer" id="footer">Select an app</div>

<script>
function sf(n){document.getElementById('footer').innerText='▶ '+n;}
</script>
</body>
</html>
