<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        h1 {
            font-size: 18px;
            margin: 10px 0;
        }
        .btn {
            display: block;
            background: #0066cc;
            color: white;
            padding: 14px;
            margin: 12px auto;
            text-decoration: none;
            font-size: 16px;
            border-radius: 8px;
            max-width: 280px;
        }
        .btn:hover, .btn:active {
            background: #0088ff;
        }
        .small {
            font-size: 14px;
            background: #333;
        }
    </style>
</head>
<body>
    <h1>📱 My Dashboard</h1>
    
    <a href="https://www.google.com/xhtml" class="btn">🔍 Google Search (Lite)</a>
    <a href="https://duckduckgo.com/lite/" class="btn">🦆 DuckDuckGo Lite</a>
    <a href="https://web.telegram.org/k/" class="btn">✉️ Telegram Web (K)</a>
    <a href="https://web.telegram.org/a/" class="btn small">Telegram Web (A)</a>
    <a href="https://m.cricbuzz.com" class="btn">🏏 Cricbuzz (Cricket)</a>
    <a href="https://en.m.wikipedia.org" class="btn">📖 Wikipedia</a>
    <a href="https://m.facebook.com" class="btn">📘 Facebook Mobile</a>
    
    <p style="margin-top:20px; font-size:13px; color:#aaa;">
        Use arrow keys / numbers to navigate.<br>
        Add more links as needed.
    </p>
</body>
</html>
